name: backend-ci

on:
  push:
    paths:
      - "duabusiness/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "duabusiness/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: duabusiness

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend solution
        run: dotnet restore DUA.Business.sln --configfile NuGet.Config

      - name: Build backend solution
        run: dotnet build DUA.Business.sln --configuration Release --no-restore

      - name: Upload OpenAPI contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: dua-backend-openapi
          path: duabusiness/src/DUA.Backend/wwwroot/openapi/dua-backend.openapi.json
